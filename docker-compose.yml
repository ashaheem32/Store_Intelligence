services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - sqlite_data:/data
      - ./dataset:/app/dataset:ro
    environment:
      - DB_PATH=/data/store.db
      - LOG_LEVEL=INFO
      - STALE_FEED_MINUTES=10
      - STORE_LAYOUT_PATH=/app/dataset/store_layout.json
      - POS_DATA_PATH=/app/dataset/pos_transactions.csv

  pipeline:
    build: .
    volumes:
      - ./Footage:/app/Footage:ro
      - ./dataset:/app/dataset:ro
      - ./output:/app/output
    environment:
      - API_URL=http://api:8000
    command: ["bash", "pipeline/run.sh"]
    depends_on:
      - api
    profiles:
      - pipeline

volumes:
  sqlite_data:
